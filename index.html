<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORE AI | Functional Recovery</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        :root {
            --kore-coral: #C17F73;
            --kore-cream: #FFFAF1;
            --kore-dark: #333333;
        }

        body {
            background-color: var(--kore-cream);
            color: var(--kore-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 20px; }
        
        h1 { font-size: 2.5rem; margin-bottom: 5px; color: var(--kore-dark); }
        .subtitle { color: var(--kore-coral); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid var(--kore-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }

        .controls { margin-top: 25px; text-align: center; }

        button {
            background-color: var(--kore-coral);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(193, 127, 115, 0.4);
        }

        .status-card {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            border-left: 5px solid var(--kore-coral);
        }

        #status-text { font-weight: bold; color: green; }
    </style>
</head>
<body>

    <header>
        <h1>KORE</h1>
        <p class="subtitle">Maternal Strength Restored</p>
    </header>

    <div class="app-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <div class="controls">
        <button id="start-btn">Start 15-Min Flow</button>
    </div>

    <div class="status-card">
        <h3>AI Analysis: <span id="status-text">Scanning for alignment...</span></h3>
        <p id="feedback">Position your phone and stand so your full torso is visible.</p>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const feedback = document.getElementById('feedback');

        let detector;

        // Initialize Camera and AI
        async function setupApp() {
            // 1. Get Access to Camera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            // 2. Load the AI Model (MoveNet)
            statusText.innerText = "Loading AI Model...";
            const model = poseDetection.SupportedModels.MoveNet;
            detector = await poseDetection.createDetector(model);
            statusText.innerText = "AI Active";
            
            detectPose();
        }

        async function detectPose() {
            const poses = await detector.estimatePoses(video);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (poses.length > 0) {
                drawKeypoints(poses[0].keypoints);
                analyzeAlignment(poses[0].keypoints);
            }

            requestAnimationFrame(detectPose);
        }

        function drawKeypoints(keypoints) {
            keypoints.forEach(point => {
                if (point.score > 0.5) {
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = "#C17F73";
                    ctx.fill();
                }
            });
        }

        // Logic specifically for Diastasis Recti posture
        function analyzeAlignment(keypoints) {
            const lShoulder = keypoints.find(k => k.name === 'left_shoulder');
            const rShoulder = keypoints.find(k => k.name === 'right_shoulder');
            
            if (lShoulder.score > 0.5 && rShoulder.score > 0.5) {
                // Check if shoulders are level (economist's precision!)
                const diff = Math.abs(lShoulder.y - rShoulder.y);
                if (diff < 20) {
                    feedback.innerText = "Perfect Alignment. Core engaged.";
                    feedback.style.color = "green";
                } else {
                    feedback.innerText = "Level your shoulders to protect your spine.";
                    feedback.style.color = "red";
                }
            }
        }

        setupApp();
    </script>
</body>
</html>
